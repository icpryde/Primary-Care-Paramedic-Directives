name: Build iOS IPA

on:
  push:
    branches: [main]
  workflow_dispatch:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  build-ipa:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Read app version
        id: version
        run: echo "APP_VERSION=$(node -p "require('./package.json').version")" >> "$GITHUB_OUTPUT"

      - name: Install dependencies
        run: npm ci

      - name: Build web bundle
        run: npm run build:web

      - name: Ensure iOS platform exists
        run: |
          if [ -d "ios/App/App.xcodeproj" ]; then
            echo "iOS platform already present"
          else
            npx cap add ios
          fi

      - name: Sync iOS project
        run: npx cap sync ios

      - name: Set iOS version from package.json
        env:
          APP_VERSION: ${{ steps.version.outputs.APP_VERSION }}
          BUILD_NUMBER: ${{ github.run_number }}
        run: |
          PBX="ios/App/App.xcodeproj/project.pbxproj"
          /usr/bin/sed -i '' -E "s/MARKETING_VERSION = [^;]+;/MARKETING_VERSION = ${APP_VERSION};/g" "$PBX"
          /usr/bin/sed -i '' -E "s/CURRENT_PROJECT_VERSION = [^;]+;/CURRENT_PROJECT_VERSION = ${BUILD_NUMBER};/g" "$PBX"
          echo "--- Patched project.pbxproj ---"
          grep -E "MARKETING_VERSION|CURRENT_PROJECT_VERSION" "$PBX" | head -4

      - name: Apply repository app icon
        run: npm run ios:icon

      - name: Build unsigned app for iphoneos
        run: |
          xcodebuild \
            -project ios/App/App.xcodeproj \
            -scheme App \
            -configuration Release \
            -sdk iphoneos \
            -derivedDataPath build \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            build

      - name: Package IPA
        run: |
          mkdir -p build/Payload
          cp -R build/Build/Products/Release-iphoneos/App.app build/Payload/App.app
          cd build
          /usr/bin/zip -qry "PCP-Directives-v${{ steps.version.outputs.APP_VERSION }}.ipa" Payload

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: PCP-Directives-v${{ steps.version.outputs.APP_VERSION }}-ipa
          path: build/PCP-Directives-v${{ steps.version.outputs.APP_VERSION }}.ipa
          if-no-files-found: error
          retention-days: 30

      - name: Remove old IPA assets from release
        if: github.event_name == 'push'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          for asset in $(gh release view latest --json assets -q '.assets[].name' 2>/dev/null | grep -E '\.ipa$'); do
            echo "Deleting old asset: $asset"
            gh release delete-asset latest "$asset" --yes 2>/dev/null || true
          done

      - name: Publish IPA to Latest release
        if: github.event_name == 'push'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: Latest Build (v${{ steps.version.outputs.APP_VERSION }})
          body: |
            **Version ${{ steps.version.outputs.APP_VERSION }}** — automatically updated with every push to `main`.

            **iOS:** Download the `.ipa` below and sideload via AltStore, TrollStore, or Xcode.
            **Android:** Download the `.apk` below and install directly.
          prerelease: true
          make_latest: true
          files: build/PCP-Directives-v${{ steps.version.outputs.APP_VERSION }}.ipa
          overwrite_files: true

      - name: Attach IPA to tagged Release
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        with:
          files: build/PCP-Directives-v${{ steps.version.outputs.APP_VERSION }}.ipa
          overwrite_files: true
