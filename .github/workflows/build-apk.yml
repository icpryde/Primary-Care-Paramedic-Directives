name: Build Android APK

on:
  push:
    branches: [main]
  workflow_dispatch:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  build-apk:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Setup Java (AGP 8.13 requires JDK 21)
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: 'platform-tools platforms;android-36 build-tools;36.0.0'

      - name: Read app version
        id: version
        run: echo "APP_VERSION=$(node -p "require('./package.json').version")" >> "$GITHUB_OUTPUT"

      - name: Install dependencies
        run: npm ci

      - name: Build web bundle
        run: npm run build:web

      - name: Ensure Android platform exists
        run: |
          if [ -d "android/app" ]; then
            echo "Android platform already present"
          else
            npx cap add android
          fi

      - name: Sync Android project
        run: npx cap sync android

      - name: Apply Android app icon
        run: npm run android:icon

      - name: Build release APK
        working-directory: android
        run: ./gradlew assembleRelease --no-daemon

      - name: Prepare Android keystore
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          KEYSTORE_PATH="android-signing.keystore"

          if [ -n "$ANDROID_KEYSTORE_BASE64" ] && [ -n "$ANDROID_KEYSTORE_PASSWORD" ] && [ -n "$ANDROID_KEY_ALIAS" ] && [ -n "$ANDROID_KEY_PASSWORD" ]; then
            KEYSTORE_B64_CLEAN="$(printf '%s' "$ANDROID_KEYSTORE_BASE64" | tr -d '\r\n\t ')"

            if printf '%s' "$KEYSTORE_B64_CLEAN" | base64 --decode > "$KEYSTORE_PATH" 2>decode-error.log; then
              echo "Using keystore from GitHub secrets"
            elif printf '%s' "$KEYSTORE_B64_CLEAN" | tr '_-' '/+' | base64 --decode > "$KEYSTORE_PATH" 2>decode-error.log; then
              echo "Using URL-safe base64 keystore from GitHub secrets"
            else
              echo "Secret keystore decode failed; falling back to generated test keystore"
              cat decode-error.log
              rm -f "$KEYSTORE_PATH"
              ANDROID_KEYSTORE_PASSWORD="android-test-pass"
              ANDROID_KEY_ALIAS="android-test-key"
              ANDROID_KEY_PASSWORD="android-test-pass"
              keytool -genkeypair -v \
                -keystore "$KEYSTORE_PATH" \
                -storepass "$ANDROID_KEYSTORE_PASSWORD" \
                -keypass "$ANDROID_KEY_PASSWORD" \
                -alias "$ANDROID_KEY_ALIAS" \
                -dname "CN=PCP Directives Test, OU=CI, O=PCP Directives, L=Toronto, S=ON, C=CA" \
                -keyalg RSA \
                -keysize 2048 \
                -validity 3650
            fi
          else
            echo "Signing secrets missing; generating test keystore for release artifact"
            ANDROID_KEYSTORE_PASSWORD="android-test-pass"
            ANDROID_KEY_ALIAS="android-test-key"
            ANDROID_KEY_PASSWORD="android-test-pass"
            keytool -genkeypair -v \
              -keystore "$KEYSTORE_PATH" \
              -storepass "$ANDROID_KEYSTORE_PASSWORD" \
              -keypass "$ANDROID_KEY_PASSWORD" \
              -alias "$ANDROID_KEY_ALIAS" \
              -dname "CN=PCP Directives Test, OU=CI, O=PCP Directives, L=Toronto, S=ON, C=CA" \
              -keyalg RSA \
              -keysize 2048 \
              -validity 3650
          fi

          echo "ANDROID_SIGNING_KEYSTORE_PATH=$KEYSTORE_PATH" >> "$GITHUB_ENV"
          echo "ANDROID_SIGNING_KEYSTORE_PASSWORD=$ANDROID_KEYSTORE_PASSWORD" >> "$GITHUB_ENV"
          echo "ANDROID_SIGNING_KEY_ALIAS=$ANDROID_KEY_ALIAS" >> "$GITHUB_ENV"
          echo "ANDROID_SIGNING_KEY_PASSWORD=$ANDROID_KEY_PASSWORD" >> "$GITHUB_ENV"

      - name: Align and sign APK
        run: |
          BUILD_TOOLS_DIR="${ANDROID_HOME:-$ANDROID_SDK_ROOT}/build-tools/36.0.0"
          UNSIGNED_APK="android/app/build/outputs/apk/release/app-release-unsigned.apk"
          ALIGNED_APK="android/app/build/outputs/apk/release/app-release-aligned.apk"
          SIGNED_APK="android/app/build/outputs/apk/release/app-release-signed.apk"

          "$BUILD_TOOLS_DIR/zipalign" -f -p 4 "$UNSIGNED_APK" "$ALIGNED_APK"
          "$BUILD_TOOLS_DIR/apksigner" sign \
            --ks "$ANDROID_SIGNING_KEYSTORE_PATH" \
            --ks-key-alias "$ANDROID_SIGNING_KEY_ALIAS" \
            --ks-pass "pass:$ANDROID_SIGNING_KEYSTORE_PASSWORD" \
            --key-pass "pass:$ANDROID_SIGNING_KEY_PASSWORD" \
            --out "$SIGNED_APK" \
            "$ALIGNED_APK"

      - name: Verify APK signature and alignment
        run: |
          BUILD_TOOLS_DIR="${ANDROID_HOME:-$ANDROID_SDK_ROOT}/build-tools/36.0.0"
          SIGNED_APK="android/app/build/outputs/apk/release/app-release-signed.apk"
          "$BUILD_TOOLS_DIR/apksigner" verify --verbose --print-certs "$SIGNED_APK"
          "$BUILD_TOOLS_DIR/zipalign" -c -v 4 "$SIGNED_APK"

      - name: Rename signed APK
        run: |
          cp android/app/build/outputs/apk/release/app-release-signed.apk \
             "PCP-Directives-v${{ steps.version.outputs.APP_VERSION }}.apk"

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: PCP-Directives-v${{ steps.version.outputs.APP_VERSION }}-apk
          path: PCP-Directives-v${{ steps.version.outputs.APP_VERSION }}.apk
          if-no-files-found: error
          retention-days: 30

      - name: Remove old APK assets from release
        if: github.event_name == 'push'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          for asset in $(gh release view latest --json assets -q '.assets[].name' 2>/dev/null | grep -E '\.apk$'); do
            echo "Deleting old asset: $asset"
            gh release delete-asset latest "$asset" --yes 2>/dev/null || true
          done

      - name: Publish APK to Latest release
        if: github.event_name == 'push'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: Latest Build (v${{ steps.version.outputs.APP_VERSION }})
          body: |
            **Version ${{ steps.version.outputs.APP_VERSION }}** — automatically updated with every push to `main`.

            **iOS:** Download the `.ipa` below and sideload via AltStore, TrollStore, or Xcode.
            **Android:** Download the `.apk` below and install directly.
          prerelease: true
          make_latest: true
          files: PCP-Directives-v${{ steps.version.outputs.APP_VERSION }}.apk
          overwrite_files: true

      - name: Attach APK to tagged Release
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        with:
          files: PCP-Directives-v${{ steps.version.outputs.APP_VERSION }}.apk
          overwrite_files: true
