name: Build Android APK

on:
  push:
    branches: [main]
  workflow_dispatch:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  build-apk:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Setup Java (Android SDK needs JDK 17)
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install dependencies
        run: npm ci

      - name: Build web bundle
        run: npm run build:web

      - name: Ensure Android platform exists
        run: |
          if [ -d "android/app" ]; then
            echo "Android platform already present"
          else
            npx cap add android
          fi

      - name: Sync Android project
        run: npx cap sync android

      - name: Build release APK
        working-directory: android
        run: ./gradlew assembleRelease --no-daemon

      - name: Rename APK
        run: |
          cp android/app/build/outputs/apk/release/app-release-unsigned.apk \
             Directives-unsigned.apk

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: Directives-unsigned-apk
          path: Directives-unsigned.apk
          if-no-files-found: error
          retention-days: 30

      - name: Publish APK to Latest release
        if: github.event_name == 'push'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: Latest Build
          body: |
            Automatically updated with every push to `main`.

            **iOS:** Download the `.ipa` below and sideload via AltStore, TrollStore, or Xcode.
            **Android:** Download the `.apk` below and install directly.
          prerelease: true
          make_latest: true
          files: Directives-unsigned.apk
          overwrite_files: true

      - name: Attach APK to tagged Release
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        with:
          files: Directives-unsigned.apk
          overwrite_files: true
