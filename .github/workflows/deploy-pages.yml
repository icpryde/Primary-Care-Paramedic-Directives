name: Deploy to GitHub Pages

on:
  push:
    branches: [main]

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Bump app version
        run: |
          CURRENT=$(grep -o 'pcp-directives-v[0-9]*' sw.js | grep -o '[0-9]*$')
          NEXT=$((CURRENT + 1))
          echo "Bumping v${CURRENT} → v${NEXT}"
          sed -i "s/pcp-directives-v${CURRENT}/pcp-directives-v${NEXT}/" sw.js
          sed -i "s/App v${CURRENT}/App v${NEXT}/" index.html
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add sw.js index.html
          git commit -m "chore: bump app to v${NEXT} [skip ci]"
          git push

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
